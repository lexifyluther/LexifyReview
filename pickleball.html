<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pickleball</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');

// === CONSTANTS ===
const CW=20,CL=44,HALF=CL/2,KITCHEN=7;
const COURT_EXTRA=8; // retreat space behind baselines
const NET_HC=2.83,NET_HS=3;
const BALL_R=0.12;

// Player body
const BODY_W=1.6,BODY_D=0.9,HEAD_R=0.35;
const UPPER_ARM=1.0,FOREARM=1.3,PADDLE_LEN=0.7,PADDLE_WID=0.45;
const PADDLE_HIT_R=1.0;

// Physics
const MAX_SPD=16,P_ACCEL=45,P_DECEL=35;
const GRAV=32,BOUNCE_E=0.5,DRAG=0.995;
const CHARGE_MAX=0.8,SWING_DUR_MIN=0.12,SWING_DUR_MAX=0.3;
const HIT_MIN=20,HIT_MAX=70;

// Control puppet
const CTRL_R=2.0,CTRL_OFFSET=3.5;

const DEG=Math.PI/180;

let W,H,SC,CX,CY,UIH=60;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  const totalH=CL+COURT_EXTRA*2;
  const mx=20,my=10;
  SC=Math.min((W-mx*2)/CW,(H-UIH-my*2)/totalH);
  CX=(W-CW*SC)/2;
  CY=UIH+(H-UIH-totalH*SC)/2+COURT_EXTRA*SC;
}

function toS(cx,cy){return{x:CX+(cx+CW/2)*SC,y:CY+(cy+HALF)*SC}}
function toC(sx,sy){return{x:(sx-CX)/SC-CW/2,y:(sy-CY)/SC-HALF}}

// === SOUND ===
let aCtx;
function initA(){
  if(!aCtx){
    aCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(aCtx.state==='suspended')aCtx.resume();
  }
}

function snd(type){
  if(!aCtx)return;
  const t=aCtx.currentTime;
  if(type==='hit'){
    const len=0.07;
    const buf=aCtx.createBuffer(1,aCtx.sampleRate*len,aCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.08));
    const src=aCtx.createBufferSource();src.buffer=buf;
    const flt=aCtx.createBiquadFilter();
    flt.type='bandpass';flt.frequency.value=2500;flt.Q.value=1.5;
    const g=aCtx.createGain();
    g.gain.setValueAtTime(0.7,t);g.gain.exponentialRampToValueAtTime(0.01,t+len);
    src.connect(flt).connect(g).connect(aCtx.destination);
    src.start(t);src.stop(t+len);
  }else if(type==='bounce'){
    const len=0.1;
    const buf=aCtx.createBuffer(1,aCtx.sampleRate*len,aCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++){
      const freq=180*Math.exp(-i/(d.length*0.25));
      d[i]=Math.sin(2*Math.PI*freq*i/aCtx.sampleRate)*Math.exp(-i/(d.length*0.15));
    }
    const src=aCtx.createBufferSource();src.buffer=buf;
    const g=aCtx.createGain();
    g.gain.setValueAtTime(0.5,t);g.gain.exponentialRampToValueAtTime(0.01,t+len);
    src.connect(g).connect(aCtx.destination);
    src.start(t);src.stop(t+len);
  }else if(type==='net'){
    const o=aCtx.createOscillator(),g=aCtx.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(100,t);
    g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.2);
    o.connect(g).connect(aCtx.destination);o.start(t);o.stop(t+0.2);
  }else if(type==='score'){
    const o=aCtx.createOscillator(),g=aCtx.createGain();
    o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(659,t+0.1);
    o.frequency.setValueAtTime(784,t+0.2);
    g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.4);
    o.connect(g).connect(aCtx.destination);o.start(t);o.stop(t+0.4);
  }else if(type==='out'){
    const o=aCtx.createOscillator(),g=aCtx.createGain();
    o.type='square';o.frequency.setValueAtTime(200,t);
    o.frequency.exponentialRampToValueAtTime(100,t+0.3);
    g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.3);
    o.connect(g).connect(aCtx.destination);o.start(t);o.stop(t+0.3);
  }
}

// === GAME STATE ===
let G={
  state:'ready',server:1,score:[0,0],serveRight:true,
  bounceCount:0,lastHitBy:0,hitCount:0,
  serveBounced:false,returnBounced:false,
  markers:[],pointTimer:0,pointMsg:'',
  botServeTimer:0,readyTimer:0
};

let ball={x:0,y:0,z:0,vx:0,vy:0,vz:0,active:false};

// === PLAYER ===
function mkPlayer(id,y,bot){
  return{id,x:0,y,vx:0,vy:0,targetX:0,targetY:y,bot,
    facingUp:y>0,swinging:false,swingProg:0,swingDur:0.2,
    swingPow:0,charging:false,chargeT:0,backhand:false,
    moveTouch:null,swingTouch:null};
}

let p1,p2;
function initPlayers(){p1=mkPlayer(1,18,false);p2=mkPlayer(2,-18,false)}

function ctrlPt(p){
  return{x:p.x,y:p.y+(p.facingUp?CTRL_OFFSET:-CTRL_OFFSET)};
}

function getServePositions(){
  if(G.server===1){
    const sx=G.serveRight?5:-5;
    const rx=G.serveRight?-5:5;
    return{serverPos:{x:sx,y:HALF-2},receiverPos:{x:rx,y:-(HALF-2)}};
  }else{
    const sx=G.serveRight?-5:5;
    const rx=G.serveRight?5:-5;
    return{serverPos:{x:sx,y:-(HALF-2)},receiverPos:{x:rx,y:HALF-2}};
  }
}

// === ARM COMPUTATION ===
function getArmState(p){
  if(p.swinging){
    const t=p.swingProg;
    const ease=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    if(p.backhand){
      const ua=(-50+90*ease)*DEG;
      const eb=(t<0.4?(100+70*(t/0.4)):(170-30*((t-0.4)/0.6)))*DEG;
      return{upperAngle:ua,elbowBend:eb,isBackhand:true};
    }else{
      const ua=(50-90*ease)*DEG;
      const eb=(t<0.4?(120+50*(t/0.4)):(170-30*((t-0.4)/0.6)))*DEG;
      return{upperAngle:ua,elbowBend:eb,isBackhand:false};
    }
  }else if(p.charging){
    return p.backhand
      ?{upperAngle:-50*DEG,elbowBend:100*DEG,isBackhand:true}
      :{upperAngle:50*DEG,elbowBend:120*DEG,isBackhand:false};
  }
  // Default ready: paddle roughly parallel to net
  return{upperAngle:30*DEG,elbowBend:150*DEG,isBackhand:false};
}

function computeArm(p,armState){
  const{upperAngle,elbowBend,isBackhand}=armState;
  const isP1=p.id===1;
  const fwdY=isP1?-1:1;
  const rightX=isP1?1:-1;

  // Shoulder on active arm side
  const side=isBackhand?-1:1;
  const sx=p.x+rightX*side*BODY_W/2;
  const sy=p.y+fwdY*BODY_D/4;

  // Upper arm direction: cos(α)*forward + sin(α)*right
  const uDx=rightX*Math.sin(upperAngle);
  const uDy=fwdY*Math.cos(upperAngle);
  const ex=sx+uDx*UPPER_ARM;
  const ey=sy+uDy*UPPER_ARM;

  // Forearm with elbow bend
  const bendDev=Math.PI-elbowBend;
  const bendSign=isBackhand?1:-1;
  const faAng=upperAngle+bendSign*bendDev;
  const fDx=rightX*Math.sin(faAng);
  const fDy=fwdY*Math.cos(faAng);
  const totalF=FOREARM+PADDLE_LEN*0.5;
  const hx=ex+fDx*totalF;
  const hy=ey+fDy*totalF;

  return{
    shoulder:{x:sx,y:sy},elbow:{x:ex,y:ey},hand:{x:hx,y:hy},
    forearmDir:{x:fDx,y:fDy},paddleDir:{x:-fDy,y:fDx}
  };
}

function computeSecondArm(p,primary){
  const isP1=p.id===1;
  const rightX=isP1?1:-1;
  const fwdY=isP1?-1:1;
  const sx2=p.x+rightX*BODY_W/2;
  const sy2=p.y+fwdY*BODY_D/4;
  const handleX=primary.hand.x-primary.forearmDir.x*PADDLE_LEN*0.7;
  const handleY=primary.hand.y-primary.forearmDir.y*PADDLE_LEN*0.7;
  const midX=(sx2+handleX)/2,midY=(sy2+handleY)/2;
  const dx=handleX-sx2,dy=handleY-sy2;
  return{
    shoulder:{x:sx2,y:sy2},
    elbow:{x:midX-dy*0.3,y:midY+dx*0.3},
    hand:{x:handleX,y:handleY}
  };
}

function getPaddlePos(p){
  return computeArm(p,getArmState(p)).hand;
}

// === BALL PHYSICS ===
function updateBall(dt){
  if(!ball.active)return;
  ball.vz-=GRAV*dt;
  const df=Math.pow(DRAG,dt*60);
  ball.vx*=df;ball.vy*=df;
  const py=ball.y;
  ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;ball.z+=ball.vz*dt;

  // Net crossing
  if((py<0&&ball.y>=0)||(py>0&&ball.y<=0)){
    const t=(0-py)/(ball.y-py);
    const zN=ball.z-ball.vz*dt*(1-t);
    const xR=Math.abs(ball.x)/(CW/2);
    const nH=NET_HC+(NET_HS-NET_HC)*Math.min(xR,1);
    if(zN<nH){
      ball.vy*=-0.3;ball.vx*=0.3;ball.vz=Math.abs(ball.vz)*0.2;
      ball.y=py>0?0.5:-0.5;ball.z=Math.max(ball.z,0.5);
      snd('net');endPt(ball.vy>0?1:2,'Net!');return;
    }
  }

  // Ground
  if(ball.z<=0){
    ball.z=0;
    if(ball.vz<-2){
      snd('bounce');
      G.markers.push({x:ball.x,y:ball.y,t:1.5});
      const inX=Math.abs(ball.x)<=CW/2,inY=Math.abs(ball.y)<=HALF;
      if(!inX||!inY){snd('out');endPt(G.lastHitBy===1?2:1,'Out!');return}
      if(G.hitCount===1&&!G.serveBounced){
        G.serveBounced=true;
        const oppSide=G.server===1?(ball.y<0):(ball.y>0);
        const inKit=Math.abs(ball.y)<KITCHEN;
        if(!oppSide||inKit){snd('out');endPt(G.server===1?2:1,'Fault!');return}
      }
      if(G.hitCount===2&&G.serveBounced&&!G.returnBounced)G.returnBounced=true;
      G.bounceCount++;
      if(G.bounceCount>=2){endPt(G.lastHitBy,'Double bounce!');return}
      ball.vz=-ball.vz*BOUNCE_E;ball.vx*=0.9;ball.vy*=0.9;
    }else{
      ball.vz=0;
      if(Math.abs(ball.vx)<0.5&&Math.abs(ball.vy)<0.5&&G.state==='play')
        endPt(G.lastHitBy,'');
    }
  }
}

function endPt(winner,msg){
  if(G.state!=='play'&&G.state!=='serve')return;
  G.state='point';G.pointTimer=2;G.pointMsg=msg;ball.active=false;
  if(winner===G.server){
    G.score[winner-1]++;G.serveRight=!G.serveRight;snd('score');
    if(G.score[winner-1]>=11&&G.score[winner-1]-G.score[2-winner]>=2){
      G.state='gameover';G.pointMsg=`Player ${winner} wins!`;return;
    }
  }else{G.server=winner;G.serveRight=true}
}

// === PLAYER UPDATE ===
function moveToward(p,tx,ty,dt){
  const dx=tx-p.x,dy=ty-p.y,d=Math.sqrt(dx*dx+dy*dy);
  const ms=MAX_SPD*0.7;
  if(d>0.3){
    p.vx+=(dx/d)*P_ACCEL*dt;p.vy+=(dy/d)*P_ACCEL*dt;
    const s=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    const cm=Math.min(ms,d*3);
    if(s>cm){p.vx=(p.vx/s)*cm;p.vy=(p.vy/s)*cm}
  }else{p.vx*=Math.pow(0.05,dt);p.vy*=Math.pow(0.05,dt)}
  p.x+=p.vx*dt;p.y+=p.vy*dt;
  clampBounds(p);
}

function clampBounds(p){
  p.x=Math.max(-CW/2+0.5,Math.min(CW/2-0.5,p.x));
  if(p.id===1)p.y=Math.max(0.5,Math.min(HALF+COURT_EXTRA-1,p.y));
  else p.y=Math.max(-HALF-COURT_EXTRA+1,Math.min(-0.5,p.y));
}

function updatePlayer(p,dt){
  if(p.bot){updateBot(p,dt);return}

  if(G.state==='ready'){
    const pos=getServePositions();
    const tgt=G.server===p.id?pos.serverPos:pos.receiverPos;
    moveToward(p,tgt.x,tgt.y,dt);
    updateSwing(p,dt);return;
  }

  // Movement with momentum
  if(p.moveTouch!==null){
    const dx=p.targetX-p.x,dy=p.targetY-p.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>0.2){
      p.vx+=(dx/d)*P_ACCEL*dt;p.vy+=(dy/d)*P_ACCEL*dt;
      const s=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
      const ms=Math.min(MAX_SPD,d*3);
      if(s>ms){p.vx=(p.vx/s)*ms;p.vy=(p.vy/s)*ms}
    }else{p.vx*=Math.pow(0.05,dt);p.vy*=Math.pow(0.05,dt)}
  }else{
    const s=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if(s>0.1){const f=Math.max(0,(s-P_DECEL*dt)/s);p.vx*=f;p.vy*=f}
    else{p.vx=0;p.vy=0}
  }
  p.x+=p.vx*dt;p.y+=p.vy*dt;
  clampBounds(p);
  if(p.charging)p.chargeT+=dt;
  updateSwing(p,dt);
}

function updateSwing(p,dt){
  if(!p.swinging)return;
  p.swingProg+=dt/p.swingDur;
  if(p.swingProg>=1){p.swinging=false;p.swingProg=0;return}
  if(ball.active&&ball.z<5&&p.swingProg>0.2&&p.swingProg<0.7){
    const paddle=getPaddlePos(p);
    const dx=ball.x-paddle.x,dy=ball.y-paddle.y;
    if(Math.sqrt(dx*dx+dy*dy)<PADDLE_HIT_R){
      if(Math.abs(p.y)<KITCHEN&&ball.z>0.1&&G.bounceCount===0){
        endPt(p.id===1?2:1,'Kitchen!');return;
      }
      if(G.hitCount===1&&!G.serveBounced)return;
      if(G.hitCount===2&&!G.returnBounced)return;
      hitBall(p,paddle);
    }
  }
}

function hitBall(p,paddle){
  snd('hit');G.lastHitBy=p.id;G.bounceCount=0;G.hitCount++;
  const fwdAng=p.facingUp?-Math.PI/2:Math.PI/2;
  const offX=ball.x-paddle.x;
  const finalAng=fwdAng+offX*0.15;
  const pow=Math.min(p.chargeT/CHARGE_MAX,1);
  const spd=HIT_MIN+(HIT_MAX-HIT_MIN)*pow;
  ball.vx=Math.cos(finalAng)*spd;ball.vy=Math.sin(finalAng)*spd;
  const cd=Math.sqrt((ball.x-p.x)**2+(ball.y-p.y)**2);
  const hf=Math.min(cd/(UPPER_ARM+FOREARM),1);
  ball.vz=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy)*Math.tan(0.15+hf*0.5);
  ball.z=Math.max(ball.z,2.5);
}

function startSwing(p){
  if(p.swinging)return;
  p.charging=false;p.swinging=true;p.swingProg=0;
  p.swingPow=Math.min(p.chargeT/CHARGE_MAX,1);
  p.swingDur=SWING_DUR_MIN+(SWING_DUR_MAX-SWING_DUR_MIN)*p.swingPow;
  if(ball.active)p.backhand=p.facingUp?(ball.x<p.x):(ball.x>p.x);
  else p.backhand=false;
}

function serveBall(p){
  if(G.state!=='serve')return;
  G.state='play';G.bounceCount=0;G.hitCount=1;G.lastHitBy=p.id;
  G.serveBounced=false;G.returnBounced=false;
  ball.active=true;
  const fwd=p.facingUp?-1:1;
  ball.x=p.x;ball.y=p.y+fwd*1.5;ball.z=3;
  const ss=28+Math.random()*12;
  const diagX=G.serveRight?(p.facingUp?-1:1):(p.facingUp?1:-1);
  ball.vx=diagX*ss*0.3;ball.vy=fwd*ss;ball.vz=14;
  snd('hit');
}

// === BOT AI (improved) ===
function updateBot(p,dt){
  if(G.state==='ready'){
    const pos=getServePositions();
    const tgt=G.server===p.id?pos.serverPos:pos.receiverPos;
    moveToward(p,tgt.x,tgt.y,dt);
    updateSwing(p,dt);return;
  }

  let tx=0,ty=-15;

  if(ball.active&&ball.vy<0){
    // Ball approaching bot
    const mustWait=(G.hitCount===1&&!G.serveBounced)||(G.hitCount===2&&!G.returnBounced);

    if(mustWait){
      // Predict bounce point, position there but DON'T swing
      const a=-0.5*GRAV,b=ball.vz,c=ball.z;
      const disc=b*b-4*a*c;
      if(disc>=0){
        const tBounce=(-b-Math.sqrt(disc))/(2*a);
        if(tBounce>0){
          tx=ball.x+ball.vx*tBounce;
          ty=Math.max(-HALF,Math.min(-KITCHEN-1,ball.y+ball.vy*tBounce));
        }
      }else{tx=ball.x;ty=-15}
    }else{
      // Can hit - predict intercept
      const ttr=Math.abs((p.y-ball.y)/(ball.vy||0.01));
      tx=ball.x+ball.vx*ttr;
      ty=Math.max(-HALF,Math.min(-KITCHEN-1,ball.y+ball.vy*ttr*0.5));

      const db=Math.sqrt((ball.x-p.x)**2+(ball.y-p.y)**2);
      const reach=UPPER_ARM+FOREARM+PADDLE_LEN;
      if(db<reach*1.3&&!p.swinging&&!p.charging&&ball.z<6){
        p.charging=true;p.chargeT=0;
        p.backhand=ball.x>p.x;
      }
      if(p.charging&&(p.chargeT>0.1+Math.random()*0.2||db<UPPER_ARM*0.7))
        startSwing(p);
    }
  }else if(!ball.active&&G.state==='serve'&&G.server===2){
    tx=G.serveRight?-5:5;ty=-20;
    G.botServeTimer+=dt;
    if(G.botServeTimer>1&&Math.abs(tx-p.x)<1.5&&Math.abs(ty-p.y)<1.5)
      {serveBall(p);G.botServeTimer=0}
  }else{
    // Default: center behind kitchen
    tx=0;ty=-15;
  }

  moveToward(p,tx,ty,dt);
  if(p.charging)p.chargeT+=dt;
  updateSwing(p,dt);
}

// === INPUT (2-player) ===
const touches={};

function getCtrlOffset(pl){return pl.facingUp?-CTRL_OFFSET:CTRL_OFFSET}

function onTS(e){
  e.preventDefault();initA();
  const netY=toS(0,0).y; // screen y of net = divider
  const ctrlRange=CTRL_R*SC*1.5;

  for(const t of e.changedTouches){
    const sx=t.clientX,sy=t.clientY,cp=toC(sx,sy);

    // Check both control circles
    const c1=ctrlPt(p1),c1s=toS(c1.x,c1.y);
    const d1=Math.sqrt((sx-c1s.x)**2+(sy-c1s.y)**2);
    const c2=ctrlPt(p2),c2s=toS(c2.x,c2.y);
    const d2=Math.sqrt((sx-c2s.x)**2+(sy-c2s.y)**2);

    if(d1<ctrlRange&&d1<=d2&&p1.moveTouch===null){
      p1.moveTouch=t.identifier;
      p1.targetX=cp.x;p1.targetY=cp.y+getCtrlOffset(p1);
      touches[t.identifier]={p:p1,type:'move'};
    }else if(d2<ctrlRange&&p2.moveTouch===null){
      p2.moveTouch=t.identifier;
      p2.targetX=cp.x;p2.targetY=cp.y+getCtrlOffset(p2);
      touches[t.identifier]={p:p2,type:'move'};
    }else if(sy>netY&&p1.swingTouch===null){
      p1.swingTouch=t.identifier;p1.charging=true;p1.chargeT=0;
      touches[t.identifier]={p:p1,type:'swing'};
    }else if(sy<=netY&&p2.swingTouch===null){
      p2.swingTouch=t.identifier;p2.charging=true;p2.chargeT=0;
      touches[t.identifier]={p:p2,type:'swing'};
    }
  }
}
function onTM(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    const info=touches[t.identifier];
    if(!info||info.type!=='move')continue;
    const cp=toC(t.clientX,t.clientY);
    info.p.targetX=cp.x;
    info.p.targetY=cp.y+getCtrlOffset(info.p);
  }
}
function onTE(e){
  e.preventDefault();
  for(const t of e.changedTouches){
    const info=touches[t.identifier];
    if(!info)continue;
    const pl=info.p;
    if(info.type==='move')pl.moveTouch=null;
    if(info.type==='swing'){
      pl.swingTouch=null;
      if(G.state==='serve'&&G.server===pl.id)serveBall(pl);
      else if(pl.charging)startSwing(pl);
    }
    delete touches[t.identifier];
  }
}
canvas.addEventListener('touchstart',onTS);
canvas.addEventListener('touchmove',onTM);
canvas.addEventListener('touchend',onTE);
canvas.addEventListener('touchcancel',onTE);

// Mouse fallback (position-based: bottom half=P1, top half=P2)
let mDown=false,mInfo=null;
canvas.addEventListener('mousedown',e=>{
  initA();mDown=true;
  const sx=e.clientX,sy=e.clientY,cp=toC(sx,sy);
  const netY=toS(0,0).y;
  const ctrlRange=CTRL_R*SC*1.5;

  const c1=ctrlPt(p1),c1s=toS(c1.x,c1.y);
  const d1=Math.sqrt((sx-c1s.x)**2+(sy-c1s.y)**2);
  const c2=ctrlPt(p2),c2s=toS(c2.x,c2.y);
  const d2=Math.sqrt((sx-c2s.x)**2+(sy-c2s.y)**2);

  if(d1<ctrlRange&&d1<=d2){
    mInfo={p:p1,type:'move'};p1.moveTouch='m';
    p1.targetX=cp.x;p1.targetY=cp.y+getCtrlOffset(p1);
  }else if(d2<ctrlRange){
    mInfo={p:p2,type:'move'};p2.moveTouch='m';
    p2.targetX=cp.x;p2.targetY=cp.y+getCtrlOffset(p2);
  }else if(sy>netY){
    mInfo={p:p1,type:'swing'};p1.swingTouch='m';p1.charging=true;p1.chargeT=0;
  }else{
    mInfo={p:p2,type:'swing'};p2.swingTouch='m';p2.charging=true;p2.chargeT=0;
  }
});
canvas.addEventListener('mousemove',e=>{
  if(mDown&&mInfo&&mInfo.type==='move'){
    const cp=toC(e.clientX,e.clientY);
    mInfo.p.targetX=cp.x;
    mInfo.p.targetY=cp.y+getCtrlOffset(mInfo.p);
  }
});
canvas.addEventListener('mouseup',()=>{
  mDown=false;
  if(!mInfo)return;
  const pl=mInfo.p;
  if(mInfo.type==='move')pl.moveTouch=null;
  else{
    pl.swingTouch=null;
    if(G.state==='serve'&&G.server===pl.id)serveBall(pl);
    else if(pl.charging)startSwing(pl);
  }
  mInfo=null;
});

// === RENDERING ===
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  drawCourt();drawMarkers();drawShadow();
  drawPlayer(p2);drawPlayer(p1);
  drawCtrlPoint(p1);drawCtrlPoint(p2);
  drawBall();drawUI();
}

function drawCourt(){
  // Extended area behind baselines
  const et=toS(-CW/2-2,-HALF-COURT_EXTRA);
  const eb=toS(CW/2+2,HALF+COURT_EXTRA);
  ctx.fillStyle='#1a3a18';
  ctx.fillRect(et.x,et.y,eb.x-et.x,eb.y-et.y);

  // Court surface
  const tl=toS(-CW/2,-HALF),br=toS(CW/2,HALF);
  ctx.fillStyle='#2d5a27';
  ctx.fillRect(tl.x,tl.y,br.x-tl.x,br.y-tl.y);

  // Kitchen
  const kt=toS(-CW/2,-KITCHEN),kb=toS(CW/2,KITCHEN);
  ctx.fillStyle='#3d6a37';
  ctx.fillRect(kt.x,kt.y,kb.x-kt.x,kb.y-kt.y);

  // Lines
  ctx.strokeStyle='#fff';ctx.lineWidth=2;
  ctx.strokeRect(tl.x,tl.y,br.x-tl.x,br.y-tl.y);
  const cx=toS(0,0).x;
  ctx.beginPath();ctx.moveTo(cx,tl.y);ctx.lineTo(cx,kt.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,kb.y);ctx.lineTo(cx,br.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(kt.x,kt.y);ctx.lineTo(kb.x,kt.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(kt.x,kb.y);ctx.lineTo(kb.x,kb.y);ctx.stroke();

  // Net
  const nl=toS(-CW/2-0.5,0),nr=toS(CW/2+0.5,0);
  ctx.strokeStyle='#ccc';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(nl.x,nl.y);ctx.lineTo(nr.x,nr.y);ctx.stroke();
  ctx.fillStyle='#888';
  ctx.beginPath();ctx.arc(nl.x,nl.y,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(nr.x,nr.y,3,0,Math.PI*2);ctx.fill();
}

function drawPlayer(p){
  const pos=toS(p.x,p.y);
  const fwd=p.facingUp?-1:1; // forward in screen y
  const bw=BODY_W*SC,bd=BODY_D*SC;
  const armState=getArmState(p);
  const arm=computeArm(p,armState);

  // --- Legs (behind body) ---
  const legLen=0.5*SC;
  const lw=Math.max(2,0.12*SC);
  ctx.strokeStyle=p.id===1?'#3366cc':'#cc3333';
  ctx.lineWidth=lw;
  ctx.lineCap='round';
  // Left leg
  ctx.beginPath();
  ctx.moveTo(pos.x-bw*0.2,pos.y-fwd*bd*0.1);
  ctx.lineTo(pos.x-bw*0.25,pos.y-fwd*(bd*0.1+legLen));
  ctx.stroke();
  // Right leg
  ctx.beginPath();
  ctx.moveTo(pos.x+bw*0.2,pos.y-fwd*bd*0.1);
  ctx.lineTo(pos.x+bw*0.25,pos.y-fwd*(bd*0.1+legLen));
  ctx.stroke();

  // --- Body (rectangle) ---
  ctx.fillStyle=p.id===1?'#4488ff':'#ff4444';
  ctx.fillRect(pos.x-bw/2,pos.y-bd/2,bw,bd);
  ctx.strokeStyle=p.id===1?'#2266dd':'#dd2222';
  ctx.lineWidth=1;
  ctx.strokeRect(pos.x-bw/2,pos.y-bd/2,bw,bd);

  // --- Head (skin-colored, at front of body toward net) ---
  const headR=HEAD_R*SC;
  const headY=pos.y+fwd*(bd/2+headR*0.5);
  ctx.fillStyle='#ffcc88';
  ctx.beginPath();ctx.arc(pos.x,headY,headR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#cc9966';ctx.lineWidth=1;ctx.stroke();

  // --- Arms ---
  const armLW=Math.max(2,0.13*SC);
  const jointR=Math.max(2,0.07*SC);

  // Primary arm (right for forehand, left for backhand)
  const sS=toS(arm.shoulder.x,arm.shoulder.y);
  const eS=toS(arm.elbow.x,arm.elbow.y);
  const hS=toS(arm.hand.x,arm.hand.y);

  ctx.strokeStyle='#ffcc88';ctx.lineWidth=armLW;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(sS.x,sS.y);ctx.lineTo(eS.x,eS.y);ctx.stroke();
  ctx.fillStyle='#eebb77';
  ctx.beginPath();ctx.arc(eS.x,eS.y,jointR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#ffcc88';
  ctx.beginPath();ctx.moveTo(eS.x,eS.y);ctx.lineTo(hS.x,hS.y);ctx.stroke();

  // Second arm for backhand (2-hand grip)
  if(armState.isBackhand){
    const sa=computeSecondArm(p,arm);
    const s2=toS(sa.shoulder.x,sa.shoulder.y);
    const e2=toS(sa.elbow.x,sa.elbow.y);
    const h2=toS(sa.hand.x,sa.hand.y);
    ctx.strokeStyle='#ffcc88';ctx.lineWidth=armLW;
    ctx.beginPath();ctx.moveTo(s2.x,s2.y);ctx.lineTo(e2.x,e2.y);ctx.stroke();
    ctx.fillStyle='#eebb77';
    ctx.beginPath();ctx.arc(e2.x,e2.y,jointR,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ffcc88';
    ctx.beginPath();ctx.moveTo(e2.x,e2.y);ctx.lineTo(h2.x,h2.y);ctx.stroke();
  }else{
    // Non-active arm (left) in relaxed position at side
    const isP1=p.id===1;
    const rightX=isP1?1:-1;
    const fwdY=isP1?-1:1;
    const lsx=p.x-rightX*BODY_W/2;
    const lsy=p.y+fwdY*BODY_D/4;
    const lsS=toS(lsx,lsy);
    // Relaxed arm hanging slightly to side and back
    const leX=lsx-rightX*0.4;
    const leY=lsy-fwdY*0.3;
    const leS=toS(leX,leY);
    const lhX=leX-rightX*0.2;
    const lhY=leY-fwdY*0.6;
    const lhS=toS(lhX,lhY);
    ctx.strokeStyle='#ffcc88';ctx.lineWidth=armLW;
    ctx.beginPath();ctx.moveTo(lsS.x,lsS.y);ctx.lineTo(leS.x,leS.y);ctx.stroke();
    ctx.fillStyle='#eebb77';
    ctx.beginPath();ctx.arc(leS.x,leS.y,jointR,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ffcc88';
    ctx.beginPath();ctx.moveTo(leS.x,leS.y);ctx.lineTo(lhS.x,lhS.y);ctx.stroke();
  }

  // --- Paddle (oval at hand position) ---
  const pLen=PADDLE_LEN*SC*0.6;
  const pWid=PADDLE_WID*SC*0.4;
  const padAngle=Math.atan2(arm.paddleDir.y,arm.paddleDir.x);
  ctx.save();
  ctx.translate(hS.x,hS.y);
  ctx.rotate(padAngle);
  // Paddle face
  ctx.fillStyle='#22bb33';
  ctx.beginPath();ctx.ellipse(0,0,pLen,pWid,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#118822';ctx.lineWidth=1.5;ctx.stroke();
  // Handle line toward forearm
  const toElbow=Math.atan2(eS.y-hS.y,eS.x-hS.x)-padAngle;
  ctx.strokeStyle='#8B4513';ctx.lineWidth=Math.max(2,0.06*SC);
  ctx.beginPath();ctx.moveTo(0,0);
  ctx.lineTo(Math.cos(toElbow)*pLen*1.3,Math.sin(toElbow)*pLen*1.3);
  ctx.stroke();
  ctx.restore();
}

function drawCtrlPoint(p){
  const ctrl=ctrlPt(p),cs=toS(ctrl.x,ctrl.y);
  const r=CTRL_R*SC;
  const active=p.moveTouch!==null;

  // Dashed circle
  ctx.strokeStyle=active?'rgba(255,255,255,0.6)':'rgba(255,255,255,0.25)';
  ctx.lineWidth=2;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.arc(cs.x,cs.y,r,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);

  // Cross
  const s=r*0.25;
  ctx.strokeStyle=active?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.15)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cs.x-s,cs.y);ctx.lineTo(cs.x+s,cs.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cs.x,cs.y-s);ctx.lineTo(cs.x,cs.y+s);ctx.stroke();

  // Line to player
  const ps=toS(p.x,p.y);
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ps.x,ps.y);ctx.lineTo(cs.x,cs.y);ctx.stroke();
}

function drawShadow(){
  if(!ball.active)return;
  const p=toS(ball.x,ball.y);
  const sz=Math.max(2,BALL_R*SC*2*(1-ball.z/20));
  const al=Math.max(0.1,0.4-ball.z/30);
  ctx.fillStyle=`rgba(0,0,0,${al})`;
  ctx.beginPath();ctx.ellipse(p.x,p.y,sz,sz*0.5,0,0,Math.PI*2);ctx.fill();
}

function drawBall(){
  if(!ball.active)return;
  const p=toS(ball.x,ball.y);
  const br=Math.max(4,BALL_R*SC*3);
  const hs=1+ball.z/15,r=br*hs;
  const hr=Math.min(ball.z/10,1);
  ctx.fillStyle=`rgb(255,${Math.round(255-hr*100)},${Math.max(0,Math.round(50-hr*50))})`;
  ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#cc8800';ctx.lineWidth=1;ctx.stroke();
  if(r>5){
    ctx.fillStyle='rgba(200,150,0,0.5)';
    for(let i=0;i<4;i++){
      const a=(i/4)*Math.PI*2;
      ctx.beginPath();
      ctx.arc(p.x+Math.cos(a)*r*0.5,p.y+Math.sin(a)*r*0.5,r*0.15,0,Math.PI*2);
      ctx.fill();
    }
  }
}

function drawMarkers(){
  for(const m of G.markers){
    const p=toS(m.x,m.y);
    const al=Math.min(1,m.t);
    ctx.strokeStyle=`rgba(255,255,255,${al})`;ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(p.x-5,p.y-5);ctx.lineTo(p.x+5,p.y+5);
    ctx.moveTo(p.x+5,p.y-5);ctx.lineTo(p.x-5,p.y+5);
    ctx.stroke();
  }
}

function drawUI(){
  ctx.fillStyle='#fff';ctx.font='bold 24px Arial';ctx.textAlign='center';
  ctx.fillText(`${G.score[0]} - ${G.score[1]}`,W/2,35);
  ctx.font='14px Arial';
  ctx.fillText(G.server===1?'▼ P1 Serve':'▲ P2 Serve',W/2,55);

  // Charge bars for both players
  [p1,p2].forEach(pl=>{
    if(!pl.charging)return;
    const cw=80,ch=8,cx_=W/2-cw/2;
    const cy_=pl.id===1?H-40:UIH+10;
    const fl=Math.min(pl.chargeT/CHARGE_MAX,1);
    ctx.fillStyle='#333';ctx.fillRect(cx_,cy_,cw,ch);
    ctx.fillStyle=`rgb(${Math.round(255*fl)},${Math.round(255*(1-fl))},0)`;
    ctx.fillRect(cx_,cy_,cw*fl,ch);
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(cx_,cy_,cw,ch);
  });

  if(G.state==='point'||G.state==='gameover'){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,H/2-40,W,80);
    ctx.fillStyle='#fff';ctx.font='bold 28px Arial';
    ctx.fillText(G.pointMsg,W/2,H/2);
    if(G.state==='gameover'){
      ctx.font='18px Arial';ctx.fillText('Tap to restart',W/2,H/2+30);
    }
  }

  if(G.state==='ready'){
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='16px Arial';
    ctx.fillText('Getting ready...',W/2,H-80);
  }
  if(G.state==='serve'){
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='16px Arial';
    if(G.server===1)ctx.fillText('P1: Tap to serve',W/2,H-80);
    else ctx.fillText('P2: Tap to serve',W/2,UIH+35);
  }
}

// === GAME LOOP ===
let lt=0;
function loop(ts){
  const dt=Math.min((ts-lt)/1000,0.05);lt=ts;

  if(G.state==='ready'){
    updatePlayer(p1,dt);updatePlayer(p2,dt);
    G.readyTimer+=dt;
    const pos=getServePositions();
    const t1=G.server===1?pos.serverPos:pos.receiverPos;
    const t2=G.server===2?pos.serverPos:pos.receiverPos;
    const d1=Math.sqrt((p1.x-t1.x)**2+(p1.y-t1.y)**2);
    const d2=Math.sqrt((p2.x-t2.x)**2+(p2.y-t2.y)**2);
    if((d1<1&&d2<1)||G.readyTimer>2)G.state='serve';
  }

  if(G.state==='play'||G.state==='serve'){
    updatePlayer(p1,dt);updatePlayer(p2,dt);updateBall(dt);
    for(let i=G.markers.length-1;i>=0;i--){
      G.markers[i].t-=dt;if(G.markers[i].t<=0)G.markers.splice(i,1);
    }
  }

  if(G.state==='point'){
    G.pointTimer-=dt;if(G.pointTimer<=0)resetServe();
  }

  draw();requestAnimationFrame(loop);
}

function resetServe(){
  G.state='ready';G.bounceCount=0;G.hitCount=0;
  G.serveBounced=false;G.returnBounced=false;G.markers=[];
  G.botServeTimer=0;G.readyTimer=0;ball.active=false;
}

function resetGame(){
  G={state:'ready',server:1,score:[0,0],serveRight:true,
    bounceCount:0,lastHitBy:0,hitCount:0,
    serveBounced:false,returnBounced:false,
    markers:[],pointTimer:0,pointMsg:'',botServeTimer:0,readyTimer:0};
  ball={x:0,y:0,z:0,vx:0,vy:0,vz:0,active:false};
  initPlayers();
}

canvas.addEventListener('click',()=>{if(G.state==='gameover')resetGame()});

// Init
resize();window.addEventListener('resize',resize);
initPlayers();requestAnimationFrame(loop);
</script>
